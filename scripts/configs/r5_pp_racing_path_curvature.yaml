# R5 — Pure Pursuit + racing line: curvature pipeline + global horizon + steering filter
#
# Based on r3_pp_racing_optional.yaml. Targets the local planner's curvature-based
# speed shaping and global waypoint window — high leverage when the line is not centerline.
#
#   python3 scripts/benchmark.py --config scripts/configs/r5_pp_racing_path_curvature.yaml
#
# Wall-clock: order-of-magnitude ~30–40 min × N runs (2 laps + 1 warmup per launch)
#
# Parameter legend: values with trailing ``# TUNED …`` differ from ``r5_pc_baseline`` in this file.
# All other keys match that baseline.

- stack: pure_pursuit
  profile: r5_pc_baseline
  line: racing
  latency_ms: 0
  odom_noise_std: 0.0
  lap_count: 2
  warmup_laps: 1
  navigation:
    # Baseline: full r3_pp_racing_optional reference; no TUNED keys in this profile.
    localisation:
      ros__parameters:
        update_frequency: 50.0
    local_planner:
      ros__parameters:
        update_frequency: 10.0
        car_width: 2.0
        centreofgravity_to_frontaxle: 1.483
        frame_id: "base_link"
        cruise_velocity: 8.0
        avoid_velocity: 8.0
        max_lateral_accel: 5.5
        min_curvature: 0.012
        curvature_lookahead: 140
        curvature_smooth_window: 5
        accel_rate: 5.0
        decel_rate: 7.0
    global_planner:
      ros__parameters:
        update_frequency: 2.0
        waypoints_ahead: 5
        waypoints_behind: 2
        passed_threshold: 0.25
        centreofgravity_to_frontaxle: 1.483
        waypoint_search_ahead: 30
        waypoints_file: waypoints.csv
    path_tracker:
      ros__parameters:
        update_frequency: 50.0
        centreofgravity_to_frontaxle: 1.483
        centreofgravity_to_rearaxle: 1.483
        wheelbase: 2.966
        lookahead_gain: 0.4
        lookahead_min: 1.5
        lookahead_max: 6.0
        closest_search_ahead: 120
        steering_limits: 0.95
        steering_rate_limit: 0.0
        steer_smoothing: 1.0
        velocity_gain: 1.0
        startup_ramp_s: 2.0
        lateral_soft: 4.0
        heading_soft: 0.6

