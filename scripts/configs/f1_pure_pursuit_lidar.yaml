- stack: pure_pursuit_lidar
  profile: finetuned
  track: f1_circuit_fenced
  line: racing
  latency_ms: 0
  odom_noise_std: 0.0
  lap_count: 2
  warmup_laps: 1
  camera: false
  navigation:
    localisation:
      ros__parameters:
        update_frequency: 50.0
        use_slam: true

    local_planner:
      ros__parameters:
        update_frequency: 10.0
        car_width: 2.0
        centreofgravity_to_frontaxle: 1.483
        frame_id: "base_link"
        cruise_velocity: 7.5
        avoid_velocity: 7.5
        exploration_velocity: 3.0       # baseline; lap1 stable -> meilleure racing line
        max_lateral_accel: 5.0          # baseline 4.5; 5.5 trop nerveux
        min_curvature: 0.012
        curvature_lookahead: 110        # baseline 140; 60 = bobbing vitesse lap2
        curvature_smooth_window: 7      # baseline 5; lisse les changements de v_cruise
        accel_rate: 4.0                 # baseline; montée progressive (5.0 = jerk lap2)
        decel_rate: 6.5                 # baseline 6.0

    global_planner_lidar:
      ros__parameters:
        waypoints_ahead: 6              # baseline 5; spline goals plus lisse
        waypoints_behind: 1             # baseline 2; moins de points derrière au seam
        passed_threshold: 0.25
        centreofgravity_to_frontaxle: 1.483
        waypoint_search_ahead: 35       # baseline 30
        exploration_goal_count: 10
        exploration_goal_step: 3.0
        cg_to_lidar: 2.4
        centerline_step: 3.0            # baseline 3.5; trajectoire lap1 plus dense
        centerline_close_dist: 4.0
        centerline_min_points: 20
        centerline_post_smooth_passes: 3
        centerline_refine_passes: 3
        racing_use_map_corridor: true
        racing_boundary_margin: 1.0
        racing_mincurv_max_offset: 4.5  # baseline 5.0; moins de coupe agressive
        racing_mincurv_iters: 8000
        racing_smooth_alpha: 0.42
        racing_smooth_iters: 12         # baseline 10; lisse la trajectoire explorée
        racing_smooth_max_dev: 1.5
        racing_smooth_pre_iters: 5      # baseline 4
        racing_smooth_pre_alpha: 0.42
        racing_smooth_coarse_points: 80
        racing_smooth_energy_ratio: 0.05  # baseline; 0.03 = ligne moins lisse
        racing_track_half_width: 8.0

    path_tracker:
      ros__parameters:
        update_frequency: 50.0
        centreofgravity_to_frontaxle: 1.483
        centreofgravity_to_rearaxle: 1.483
        wheelbase: 2.966
        lookahead_gain: 0.48            # 0.45 stable; +0.03 anti-zigzag à 7.5 m/s (Ld≈5.4 m)
        lookahead_min: 1.8              # baseline 1.5
        lookahead_max: 8.0              # laisser curv_extra allonger en ligne droite
        lookahead_curv_extra: 4.0       # anti-zigzag droites, ~0 en virage
        lookahead_curv_soft: 0.10       # défaut 0.08; ignore bruit κ spline
        closest_search_ahead: 140       # baseline 120; index plus stable à haute vitesse
        steering_limits: 0.92           # baseline 0.95; limite pics de braquage
        steering_rate_limit: 3.0        # baseline 4.0; anti-saw (steer_smoothing off)
        steer_smoothing: 1.0            # filtre amplifie l'oscillation — garder off
        velocity_gain: 1.0
        startup_ramp_s: 2.0             # baseline; handoff lap1->lap2 plus doux
        lateral_soft: 4.0
        heading_soft: 0.65              # baseline 0.6; 1.2 modulait le throttle, pas le zigzag

