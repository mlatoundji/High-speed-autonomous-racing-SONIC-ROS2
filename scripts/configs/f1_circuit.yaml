- stack: pure_pursuit
  profile: f1_finetuned
  track: f1_circuit
  line: racing   # racing line min-courbure (QP): -66% courbure², rayon mini 3.5->4.4m, lisse/suivable (vs heuristique qui zigzaguait)
  latency_ms: 0
  odom_noise_std: 0.0
  lap_count: 2
  warmup_laps: 1
  camera: false  # drop third-person camera sensor (CPU saving); set true to see it in Gazebo
  navigation:
    localisation:
      ros__parameters:
        update_frequency: 50.0
    local_planner:
      ros__parameters:
        update_frequency: 10.0
        car_width: 2.0
        centreofgravity_to_frontaxle: 1.483
        frame_id: "base_link"
        cruise_velocity: 8.0
        avoid_velocity: 8.0
        max_lateral_accel: 5.5   # sweet spot centerline (6.5 = 1 offtrack sans gain de chrono)
        min_curvature: 0.012
        curvature_lookahead: 60   # 140->60: freine plus tard (140 = voyait toujours un virage -> frein permanent sur circuit twisty)
        curvature_smooth_window: 5
        accel_rate: 5.0
        decel_rate: 7.0
    global_planner:
      ros__parameters:
        update_frequency: 2.0
        waypoints_ahead: 5
        waypoints_behind: 2
        passed_threshold: 0.25
        centreofgravity_to_frontaxle: 1.483
        waypoint_search_ahead: 30
        waypoints_file: waypoints.csv   # ignoré sur f1 (le track résout waypoints_f1_racing.csv)
    path_tracker:
      ros__parameters:
        update_frequency: 50.0
        centreofgravity_to_frontaxle: 1.483
        centreofgravity_to_rearaxle: 1.483
        wheelbase: 2.966
        lookahead_gain: 0.3   # 0.5 visait trop loin -> coupait les virages serrés -> sortie de route. 0.3 = propre (112.5s). Zigzag mineur a regler autrement.
        lookahead_min: 1.0    # F1 (défaut 1.5): plus court -> tracking plus serré
        lookahead_max: 6.0
        lookahead_curv_extra: 3.0   # lookahead adaptatif: +3m en ligne droite (anti-zigzag), ~0 en virage (suivi serre). 0 = off.
        closest_search_ahead: 120
        steering_limits: 0.95
        steering_rate_limit: 4.0  # anti-oscillation (cf. défaut); écrête le saw de braquage
        steer_smoothing: 1.0
        velocity_gain: 1.0
        startup_ramp_s: 2.0
        lateral_soft: 4.0
        heading_soft: 1.2   # 0.6->1.2: frein de cap trop violent (throttle ecrase a 16% pour ~0.7 rad) -> detendu pour ne pas caler en virage
