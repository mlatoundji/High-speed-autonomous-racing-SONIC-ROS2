# F1 circuit — tuning dédié (virages bien plus serrés que le circuit par défaut).
#
#   python3 scripts/benchmark.py --config scripts/configs/f1_circuit.yaml
#
# Pourquoi une config à part : le lookahead et (plus tard) le profil de vitesse
# sont LÉGITIMEMENT spécifiques à la piste. Le `steering_rate_limit` (anti-
# oscillation), lui, est un correctif GÉNÉRAL → il vit dans le défaut
# (navigation_params.yaml) ; on le répète ici car un bloc `navigation:` inline
# remplace entièrement le défaut. Voir docs/nan_crash_root_cause.md.
#
# Deltas vs le défaut (commentés `# F1`) : path_tracker lookahead_gain/min.

- stack: pure_pursuit
  profile: f1_baseline
  track: f1_circuit
  line: racing
  latency_ms: 0
  odom_noise_std: 0.0
  lap_count: 2
  warmup_laps: 1
  camera: false  # drop third-person camera sensor (CPU saving); set true to see it in Gazebo
  navigation:
    localisation:
      ros__parameters:
        update_frequency: 50.0
    local_planner:
      ros__parameters:
        update_frequency: 10.0
        car_width: 2.0
        centreofgravity_to_frontaxle: 1.483
        frame_id: "base_link"
        cruise_velocity: 8.0
        avoid_velocity: 8.0
        max_lateral_accel: 5.5   # laissé tel quel: la voiture ralentit déjà beaucoup en virage
        min_curvature: 0.012
        curvature_lookahead: 140
        curvature_smooth_window: 5
        accel_rate: 5.0
        decel_rate: 7.0
    global_planner:
      ros__parameters:
        update_frequency: 2.0
        waypoints_ahead: 5
        waypoints_behind: 2
        passed_threshold: 0.25
        centreofgravity_to_frontaxle: 1.483
        waypoint_search_ahead: 30
        waypoints_file: waypoints.csv   # ignoré sur f1 (le track résout waypoints_f1_racing.csv)
    path_tracker:
      ros__parameters:
        update_frequency: 50.0
        centreofgravity_to_frontaxle: 1.483
        centreofgravity_to_rearaxle: 1.483
        wheelbase: 2.966
        lookahead_gain: 0.3   # F1 (défaut 0.4): lookahead plus court -> suit les virages serrés
        lookahead_min: 1.0    # F1 (défaut 1.5): plus court -> tracking plus serré
        lookahead_max: 6.0
        closest_search_ahead: 120
        steering_limits: 0.95
        steering_rate_limit: 4.0  # anti-oscillation (cf. défaut); écrête le saw de braquage
        steer_smoothing: 1.0
        velocity_gain: 1.0
        startup_ramp_s: 2.0
        lateral_soft: 4.0
        heading_soft: 0.6
