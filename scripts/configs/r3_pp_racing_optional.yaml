# R3 (optional) — Pure Pursuit + racing line + full navigation params
#
# REPORT Section 5.4: PP lookahead + inward racing line often fails by lap 2.
# Run separately from r3_racing_line.yaml to avoid a long combined batch.
#
# Navigation parameters are inlined below (same structure as
# autocar_nav_pure_pursuit/config/navigation_params.yaml). ``benchmark.py``
# writes them to ``results/benchmark_<ts>/nav_overrides/run_001.yaml`` and
# passes ``nav_config:=`` to ``race_pure_pursuit_launch.py``.
#
# To benchmark multiple tunings, duplicate the list entry and change only the
# keys you care about under ``navigation:``.
#
#   python3 scripts/benchmark.py --config scripts/configs/r3_pp_racing_optional.yaml
#
# Wall-clock: ~9 min (1 launch × 3 laps)

- stack: pure_pursuit
  profile: default
  line: racing
  latency_ms: 0
  odom_noise_std: 0.0
  lap_count: 1
  warmup_laps: 0
  navigation:
    localisation:
      ros__parameters:
        update_frequency: 50.0

    local_planner:
      ros__parameters:
        update_frequency: 10.0
        car_width: 2.0
        centreofgravity_to_frontaxle: 1.483
        frame_id: "base_link"
        cruise_velocity: 8.0
        avoid_velocity: 8.0
        max_lateral_accel: 5.5
        min_curvature: 0.012
        curvature_lookahead: 140
        curvature_smooth_window: 5
        accel_rate: 5.0
        decel_rate: 7.0

    global_planner:
      ros__parameters:
        update_frequency: 2.0
        waypoints_ahead: 5
        waypoints_behind: 2
        passed_threshold: 0.25
        centreofgravity_to_frontaxle: 1.483
        waypoint_search_ahead: 30
        waypoints_file: waypoints.csv

    path_tracker:
      ros__parameters:
        update_frequency: 50.0
        centreofgravity_to_frontaxle: 1.483
        centreofgravity_to_rearaxle: 1.483
        wheelbase: 2.966
        # need_for_speed tuning: at v=8 m/s -> Ld = 4.7 m
        lookahead_gain: 0.4
        lookahead_min: 1.5
        lookahead_max: 6.0
        closest_search_ahead: 120
        steering_limits: 0.95
        steering_rate_limit: 0.0
        steer_smoothing: 1.0
        velocity_gain: 1.0
        startup_ramp_s: 2.0
        lateral_soft: 4.0
        heading_soft: 0.6
