localisation:
    ros__parameters:
        update_frequency: 50.0

local_planner:
    ros__parameters:
        update_frequency: 10.0
        car_width: 2.0
        centreofgravity_to_frontaxle: 1.483
        frame_id: "base_link"
        cruise_velocity: 7.0
        avoid_velocity: 6.0
        max_lateral_accel: 4.0
        min_curvature: 0.015
        curvature_lookahead: 120
        curvature_smooth_window: 7
        accel_rate: 4.0
        decel_rate: 6.0

global_planner:
    ros__parameters:
        update_frequency: 2.0
        waypoints_ahead: 3
        waypoints_behind: 2
        passed_threshold: 0.25
        centreofgravity_to_frontaxle: 1.483
        waypoints_file: waypoints.csv

path_tracker:
    ros__parameters:
        update_frequency: 50.0
        centreofgravity_to_frontaxle: 1.483
        centreofgravity_to_rearaxle: 1.483
        wheelbase: 2.966
        lookahead_gain: 0.5
        lookahead_min: 2.8
        lookahead_max: 7.5
        closest_search_ahead: 120
        steering_limits: 0.85
        steering_rate_limit: 1.5
        steer_smoothing: 0.3
        velocity_gain: 1.0
        startup_ramp_s: 4.0
        max_lateral_error_for_full_speed: 2.5
