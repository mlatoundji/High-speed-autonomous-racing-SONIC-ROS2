localisation:
    ros__parameters:
        update_frequency: 50.0

local_planner:
    ros__parameters:
        update_frequency: 10.0
        car_width: 2.0
        centreofgravity_to_frontaxle: 1.483
        frame_id: "base_link"
        cruise_velocity: 8.0
        avoid_velocity: 8.0
        max_lateral_accel: 5.5
        min_curvature: 0.012
        curvature_lookahead: 140
        curvature_smooth_window: 5
        accel_rate: 5.0
        decel_rate: 7.0

global_planner:
    ros__parameters:
        update_frequency: 2.0
        waypoints_ahead: 5
        waypoints_behind: 2
        passed_threshold: 0.25
        centreofgravity_to_frontaxle: 1.483
        waypoint_search_ahead: 30
        waypoints_file: waypoints.csv

path_tracker:
    ros__parameters:
        update_frequency: 50.0
        centreofgravity_to_frontaxle: 1.483
        centreofgravity_to_rearaxle: 1.483
        wheelbase: 2.966
        # need_for_speed tuning: at v=8 m/s -> Ld = 4.7 m
        lookahead_gain: 0.4
        lookahead_min: 1.5
        lookahead_max: 6.0
        closest_search_ahead: 120
        steering_limits: 0.95
        steering_rate_limit: 4.0  # cap steering slew (was 0.0=unlimited): prevents violent saw/oscillation -> physics shock/NaN on tight tracks
        steer_smoothing: 1.0
        velocity_gain: 1.0
        startup_ramp_s: 2.0
        lateral_soft: 4.0
        heading_soft: 0.6
